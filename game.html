<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeu — Devinettes & Énigmes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <canvas id="particles-canvas"></canvas>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- ══ ÉCRAN BIENVENUE ══ -->
  <div class="overlay" id="screen-welcome">
    <div class="welcome-card">
      <div class="welcome-emoji">🎮</div>
      <h2 id="welcome-title">Bienvenue, <span id="welcome-pseudo"></span> !</h2>
      <p class="welcome-cat">Catégorie : <span id="welcome-cat"></span> &nbsp;|&nbsp; Niveau : <span id="welcome-level"></span></p>

      <div class="rules-box" id="rules-box">
        <h3>📋 Règles du jeu</h3>
        <ul id="rules-list"></ul>
      </div>

      <div class="welcome-actions">
        <button class="btn-ready" id="btn-ready">Je suis prêt ! 🚀</button>
        <button class="btn-skip-rules" id="btn-skip-rules">Passer →</button>
      </div>
    </div>
  </div>

  <!-- ══ ÉCRAN DE JEU ══ -->
  <div class="game-wrapper hidden" id="screen-game">

    <header class="game-header">
      <div class="hud-left">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score-display">0</span>
      </div>
      <div class="hud-center">
        <div class="timer-ring-wrap">
          <svg class="timer-ring" viewBox="0 0 56 56">
            <circle class="ring-bg" cx="28" cy="28" r="24"/>
            <circle class="ring-progress" id="ring-progress" cx="28" cy="28" r="24"/>
          </svg>
          <span class="timer-text" id="timer-text">45</span>
        </div>
      </div>
      <div class="hud-right">
        <span class="hud-label">Vies</span>
        <span class="hud-value" id="lives-display"></span>
      </div>
    </header>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
      <span class="progress-label" id="progress-label">0 / 10</span>
    </div>

    <main class="question-area">
      <div class="question-card" id="question-card">
        <p class="question-num" id="question-num">Question 1</p>
        <p class="question-text" id="question-text"></p>
      </div>

      <div class="answer-area">
        <input
          type="text"
          id="answer-input"
          class="answer-input"
          placeholder="Votre réponse..."
          autocomplete="off"
        />
        <button class="btn-validate" id="btn-validate">Valider ✅</button>
      </div>

      <div class="feedback-msg" id="feedback-msg"></div>

      <div class="action-btns">
        <button class="btn-hint" id="btn-hint">💡 Indice</button>
        <button class="btn-pass" id="btn-pass">⏭ Passer</button>
        <button class="btn-end" id="btn-end">🏁 Terminer</button>
        <button class="btn-sound" id="btn-sound" title="Son">🔊</button>
      </div>

      <div class="hint-box hidden" id="hint-box"></div>
    </main>
  </div>

  <!-- ══ ÉCRAN FIN DE PARTIE ══ -->
  <div class="overlay hidden" id="screen-end">
    <div class="end-card">
      <div class="end-emoji" id="end-emoji"></div>
      <h2 id="end-title"></h2>
      <p id="end-subtitle"></p>
      <div class="end-stats">
        <div class="stat-box">
          <span class="stat-num" id="stat-score">0</span>
          <span class="stat-label">Points</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="stat-correct">0</span>
          <span class="stat-label">Bonnes réponses</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="stat-time">0s</span>
          <span class="stat-label">Temps moyen</span>
        </div>
      </div>
      <div class="end-actions">
        <button class="btn-replay" id="btn-replay">🔄 Rejouer</button>
        <button class="btn-home" id="btn-home">🏠 Accueil</button>
        <button class="btn-lb" id="btn-lb">🏆 Classement</button>
      </div>
    </div>
  </div>

  <script src="P2/data.js"></script>
  <script src="P4/validator.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
